name: CI

# Lint + tests on every push to main and every PR. FuseMark is Windows-only
# (WASAPI loopback via pyaudiowpatch), so CI runs on a Windows runner.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Test (pytest)
        run: pytest
