name: CI

# Lint + tests on every push to main and every PR. FuseMark is Windows-only
# (WASAPI loopback via pyaudiowpatch), so CI runs on a Windows runner.

on:
  push:
    branches: [main]
  pull_request:

# The workflow only reads the repo; never grant the default write token.
permissions:
  contents: read

# Rapid pushes to the same PR supersede each other — cancel the stale run.
# Pushes to main are never cancelled so its history keeps a verdict per commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: windows-latest
    # Full run takes ~2 min; anything past 15 is a hung device probe or
    # subprocess, not a slow test — fail fast instead of burning 6h default.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Test (pytest)
        run: pytest
