<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nastavení — ObsiNote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="settings-page">
  <div class="settings-shell">

    <!-- Header -->
    <header class="settings-header">
      <a href="/" class="back-link">&#8592;</a>
      <h1>Nastavení</h1>
    </header>

    <!-- Two-column body -->
    <div class="settings-body">

      <!-- Left sidebar nav -->
      <nav class="settings-nav">
        <a href="#cesty" class="settings-nav-item settings-nav-active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 2h9a2 2 0 012 2z"/></svg>
          Cesty
        </a>
        <a href="#zvuk" class="settings-nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          Zvuk
        </a>
        <a href="#llm" class="settings-nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          LLM
        </a>
        <a href="#system" class="settings-nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          Systém
        </a>
        <a href="#nastroje" class="settings-nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
          Nástroje
        </a>
      </nav>

      <!-- Right scrollable content -->
      <div class="settings-content">

        <!-- Cesty -->
        <section id="cesty" class="settings-section">
          <div class="group-heading">Cesty</div>
          <div class="field">
            <label>Cesta k Obsidian vaultu</label>
            <div class="input-action-row">
              <input type="text" id="vault_path" value="{{ config.vault_path or '' }}" placeholder="C:\Users\...\Obsidian Vault">
              <button class="btn-icon" title="Procházet">&#128193;</button>
            </div>
          </div>
        </section>

        <!-- Zvuk -->
        <section id="zvuk" class="settings-section">
          <div class="group-heading">Nastavení zvuku</div>
          <div class="field">
            <label>Výstupní zařízení (loopback — systémový zvuk)</label>
            <select id="output_device">
              <option value="null">Výchozí</option>
              {% for d in devices %}
              {% if d.is_output %}
              <option value="{{ d.index }}" {% if config.output_device == d.index %}selected{% endif %}>
                [{{ d.index }}] {{ d.name }}{% if d.is_loopback %} (loopback){% endif %}
              </option>
              {% endif %}
              {% endfor %}
            </select>
          </div>
          <div class="field">
            <label>Vstupní zařízení (mikrofon)</label>
            <select id="input_device">
              <option value="null">Výchozí</option>
              {% for d in devices %}
              {% if d.is_input and not d.is_loopback %}
              <option value="{{ d.index }}" {% if config.input_device == d.index %}selected{% endif %}>
                [{{ d.index }}] {{ d.name }}
              </option>
              {% endif %}
              {% endfor %}
            </select>
          </div>
        </section>

        <!-- LLM -->
        <section id="llm" class="settings-section">
          <div class="group-heading">LLM a přepis</div>
          <div class="field">
            <label>LLM provider</label>
            <select id="llm_provider">
              <option value="anthropic" {% if config.llm_provider == 'anthropic' %}selected{% endif %}>Anthropic (Claude)</option>
              <option value="openai" {% if config.llm_provider == 'openai' %}selected{% endif %}>OpenAI (GPT-4o mini)</option>
              <option value="mistral" {% if config.llm_provider == 'mistral' %}selected{% endif %}>Mistral</option>
            </select>
          </div>
          <div class="field">
            <label>Jazyk přepisu a poznámek</label>
            <select id="language">
              <!-- populated from /api/languages -->
            </select>
          </div>
          <div class="field">
            <label>Model Whisper</label>
            <select id="whisper_model">
              {% for size in ['small', 'medium', 'large-v3', 'large-v3-turbo'] %}
              <option value="{{ size }}" {% if config.whisper_model == size %}selected{% endif %}>{{ size }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="field">
            <label>Výchozí šablona</label>
            <select id="default_template">
              <option value="">— vestavěná šablona —</option>
            </select>
            <p class="field-hint">Šablony jsou .md soubory ve složce <code>ObsiNote/Templates/</code> ve vaultu.</p>
          </div>
          <div class="group-heading" style="margin-top:1.5rem;">API klíče</div>
          <div class="field">
            <label>Anthropic API klíč</label>
            <div class="input-action-row">
              <input type="password" id="api_key_anthropic" placeholder="sk-ant-...">
              <button class="btn-inline" onclick="saveApiKey('anthropic')">Uložit</button>
            </div>
          </div>
          <div class="field">
            <label>OpenAI API klíč</label>
            <div class="input-action-row">
              <input type="password" id="api_key_openai" placeholder="sk-...">
              <button class="btn-inline" onclick="saveApiKey('openai')">Uložit</button>
            </div>
          </div>
          <div class="field">
            <label>Mistral API klíč</label>
            <div class="input-action-row">
              <input type="password" id="api_key_mistral" placeholder="...">
              <button class="btn-inline" onclick="saveApiKey('mistral')">Uložit</button>
            </div>
          </div>
        </section>

        <!-- Systém -->
        <section id="system" class="settings-section">
          <div class="group-heading">Systém</div>
          <div class="autostart-row">
            <div class="autostart-label">
              <span>Spustit automaticky se systémem Windows</span>
              <span class="field-hint">Aplikace poběží na pozadí v systémové liště.</span>
            </div>
            <label class="toggle-label">
              <input type="checkbox" id="autostart" onchange="toggleAutostart()">
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </label>
          </div>
        </section>

        <!-- Nástroje -->
        <section id="nastroje" class="settings-section">
          <div class="group-heading">Nástroje</div>
          <div class="field">
            <label>Úroveň logování</label>
            <div class="log-row">
              <select id="log_level">
                {% for level in ['DEBUG', 'INFO', 'WARNING', 'ERROR'] %}
                <option value="{{ level }}" {% if config.log_level == level %}selected{% endif %}>{{ level }}</option>
                {% endfor %}
              </select>
              <button class="btn-inline" onclick="openLog()">Otevřít log</button>
            </div>
          </div>
          <div class="field">
            <button class="btn-secondary btn-full" onclick="openGlossary()">Otevřít slovník</button>
          </div>
        </section>

      </div>
    </div>

    <!-- Sticky footer -->
    <footer class="settings-footer">
      <div id="settings-msg"></div>
      <button class="btn-save-primary" onclick="saveSettings()">Uložit nastavení</button>
    </footer>

  </div>

  <script src="/static/app.js"></script>
  <script>
    const _currentDefaultTemplate = '{{ config.default_template or "" }}';
    const _currentLanguage = '{{ config.language or "cs" }}';

    fetch('/api/templates').then(r => r.json()).then(templates => {
      const sel = document.getElementById('default_template');
      templates.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        if (t === _currentDefaultTemplate) opt.selected = true;
        sel.appendChild(opt);
      });
    });

    fetch('/api/languages').then(r => r.json()).then(langs => {
      const sel = document.getElementById('language');
      langs.forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.code;
        opt.textContent = l.name;
        if (l.code === _currentLanguage) opt.selected = true;
        sel.appendChild(opt);
      });
    });

    async function saveSettings() {
      const res = await fetch('/settings/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          vault_path: document.getElementById('vault_path').value,
          whisper_model: document.getElementById('whisper_model').value,
          output_device: document.getElementById('output_device').value,
          input_device: document.getElementById('input_device').value,
          log_level: document.getElementById('log_level').value,
          default_template: document.getElementById('default_template').value,
          llm_provider: document.getElementById('llm_provider').value,
          language: document.getElementById('language').value,
        })
      });
      const data = await res.json();
      showMsg(data.ok ? 'Uloženo.' : 'Chyba: ' + JSON.stringify(data));
    }

    async function saveApiKey(provider) {
      const key = document.getElementById('api_key_' + provider).value.trim();
      if (!key) return showMsg('Zadej API klíč.');
      const res = await fetch('/api-key', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({key, provider})
      });
      const data = await res.json();
      showMsg(data.ok ? 'API klíč uložen.' : 'Chyba: ' + JSON.stringify(data));
      document.getElementById('api_key_' + provider).value = '';
    }

    fetch('/autostart').then(r => r.json()).then(d => {
      document.getElementById('autostart').checked = d.enabled;
    });

    async function toggleAutostart() {
      const enabled = document.getElementById('autostart').checked;
      await fetch('/autostart', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({enabled}),
      });
      showMsg(enabled ? 'Autostart povolen.' : 'Autostart vypnut.');
    }

    async function openGlossary() {
      await fetch('/open-glossary', {method: 'POST'});
    }

    async function openLog() {
      const res = await fetch('/open-log', {method: 'POST'});
      if (!res.ok) showMsg('Log soubor nenalezen — zatím žádná aktivita.');
    }

    function showMsg(msg) {
      document.getElementById('settings-msg').textContent = msg;
    }
  </script>
</body>
</html>
