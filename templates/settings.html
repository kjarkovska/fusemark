<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nastavení — ObsiNote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="settings-page">
  <div class="settings-shell">

    <div class="settings-header">
      <a href="/" class="back-link">&#8592;</a>
      <h1>Nastavení</h1>
    </div>

    <!-- Cesty -->
    <section class="settings-group">
      <div class="group-heading">Cesty</div>
      <div class="field">
        <label>Cesta k Obsidian vaultu</label>
        <div class="input-action-row">
          <input type="text" id="vault_path" value="{{ config.vault_path or '' }}" placeholder="C:\Users\...\Obsidian Vault">
          <button class="btn-icon" title="Procházet">&#128193;</button>
        </div>
      </div>
    </section>

    <!-- Nastavení zvuku -->
    <section class="settings-group">
      <div class="group-heading">Nastavení zvuku</div>
      <div class="field">
        <label>Výstupní zařízení (loopback — systémový zvuk)</label>
        <select id="output_device">
          <option value="null">Výchozí</option>
          {% for d in devices %}
          {% if d.is_output %}
          <option value="{{ d.index }}" {% if config.output_device == d.index %}selected{% endif %}>
            [{{ d.index }}] {{ d.name }}{% if d.is_loopback %} (loopback){% endif %}
          </option>
          {% endif %}
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>Vstupní zařízení (mikrofon)</label>
        <select id="input_device">
          <option value="null">Výchozí</option>
          {% for d in devices %}
          {% if d.is_input and not d.is_loopback %}
          <option value="{{ d.index }}" {% if config.input_device == d.index %}selected{% endif %}>
            [{{ d.index }}] {{ d.name }}
          </option>
          {% endif %}
          {% endfor %}
        </select>
      </div>
    </section>

    <!-- LLM -->
    <section class="settings-group">
      <div class="group-heading">LLM</div>
      <div class="field">
        <label>Model Whisper</label>
        <select id="whisper_model">
          {% for size in ['small', 'medium', 'large-v3'] %}
          <option value="{{ size }}" {% if config.whisper_model == size %}selected{% endif %}>{{ size }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>Anthropic API klíč</label>
        <div class="input-action-row">
          <input type="password" id="api_key" placeholder="sk-ant-...">
          <button class="btn-secondary btn-inline" onclick="saveApiKey()">Uložit klíč</button>
        </div>
      </div>
    </section>

    <!-- System -->
    <section class="settings-group">
      <div class="group-heading">System</div>
      <div class="field">
        <label class="toggle-label">
          <input type="checkbox" id="autostart" onchange="toggleAutostart()">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span>Spustit automaticky se systémem Windows</span>
        </label>
      </div>
      <div class="field">
        <label>Úroveň logování</label>
        <select id="log_level">
          {% for level in ['DEBUG', 'INFO', 'WARNING', 'ERROR'] %}
          <option value="{{ level }}" {% if config.log_level == level %}selected{% endif %}>{{ level }}</option>
          {% endfor %}
        </select>
      </div>
    </section>

    <!-- Nástroje -->
    <section class="settings-group">
      <div class="group-heading">Nástroje</div>
      <div class="field btn-row">
        <button class="btn-secondary" onclick="openGlossary()">Otevřít slovník</button>
        <button class="btn-secondary" onclick="openLog()">Otevřít log</button>
      </div>
    </section>

    <button class="btn-save-primary" onclick="saveSettings()">Uložit nastavení</button>

    <div id="settings-msg"></div>

  </div>

  <script src="/static/app.js"></script>
  <script>
    async function saveSettings() {
      const res = await fetch('/settings/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          vault_path: document.getElementById('vault_path').value,
          whisper_model: document.getElementById('whisper_model').value,
          output_device: document.getElementById('output_device').value,
          input_device: document.getElementById('input_device').value,
          log_level: document.getElementById('log_level').value,
        })
      });
      const data = await res.json();
      showMsg(data.ok ? 'Ulozeno.' : 'Chyba: ' + JSON.stringify(data));
    }

    async function saveApiKey() {
      const key = document.getElementById('api_key').value.trim();
      if (!key) return showMsg('Zadej API klíč.');
      const res = await fetch('/api-key', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({key})
      });
      const data = await res.json();
      showMsg(data.ok ? 'API klíč uložen.' : 'Chyba: ' + JSON.stringify(data));
      document.getElementById('api_key').value = '';
    }

    fetch('/autostart').then(r => r.json()).then(d => {
      document.getElementById('autostart').checked = d.enabled;
    });

    async function toggleAutostart() {
      const enabled = document.getElementById('autostart').checked;
      await fetch('/autostart', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({enabled}),
      });
      showMsg(enabled ? 'Autostart povolen.' : 'Autostart vypnut.');
    }

    async function openGlossary() {
      await fetch('/open-glossary', {method: 'POST'});
    }

    async function openLog() {
      const res = await fetch('/open-log', {method: 'POST'});
      if (!res.ok) showMsg('Log soubor nenalezen — zatím žádná aktivita.');
    }

    function showMsg(msg) {
      document.getElementById('settings-msg').textContent = msg;
    }
  </script>
</body>
</html>
